<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD de Productos - ElectroPeru</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Mantenimiento de Productos (CRUD)</h1>

    <div class="form-container">
      <h2><span id="form-title">Crear Nuevo Producto</span></h2>
      <form id="producto-form">
        <input type="hidden" id="producto-id" value="" />

        <label for="descripcion">Descripción:</label>
        <input type="text" id="descripcion" required maxlength="100" />

        <label for="precio">Precio ($):</label>
        <input type="number" id="precio" step="0.01" required min="0" />

        <label for="garantia">Garantía (años):</label>
        <input
          type="number"
          id="garantia"
          required
          min="0"
          max="10"
          value="1"
        />

        <button type="submit" id="submit-btn">Guardar Producto</button>
        <button type="button" id="cancel-btn" style="display: none">
          Cancelar Edición
        </button>
        <a href="creditos.html">Créditos</a>
      </form>
    </div>

    <hr />

    <h2>Lista de Productos</h2>
    <table id="productos-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Precio</th>
          <th>Garantía (años)</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script src="app.js"></script>
  </body>
</html>
